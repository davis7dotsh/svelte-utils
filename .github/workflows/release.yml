name: Release CLI

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Build server bundle
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @sveltejs/repl exec vite build
          node scripts/package-server.js
          tar -czf svelte-utils-server.tar.gz -C dist-server .
      - name: Create release
        run: |
          cp bin/svelte-utils.js svelte-utils.js
          gh release create "$GITHUB_REF_NAME" svelte-utils.js svelte-utils-server.tar.gz \
            --title "$GITHUB_REF_NAME" \
            --notes "Standalone dependency-free CLI. Install: curl -fsSL https://davis7dotsh.github.io/svelte-utils/install.sh | sh"
        env:
          GH_TOKEN: ${{ github.token }}
